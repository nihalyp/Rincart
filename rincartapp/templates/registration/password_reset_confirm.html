<div class="glass-card text-center">
    <h3>Set New Password</h3>
    <p class="text-white-50 small mb-4">Please enter your new password twice below.</p>
    <form method="POST">
        {% csrf_token %}
        <!-- ജാങ്കോയുടെ സ്വന്തം പാസ്‌വേഡ് ഫോം ഫീൽഡുകൾ തനിയെ വരാൻ -->
        {% for field in form %}
            <div class="text-start small text-white-50 mb-1">{{ field.label }}</div>
            <input type="password" name="{{ field.name }}" class="form-control-dark" required>
            {% if field.errors %}<div class="text-danger small mb-2">{{ field.errors }}</div>{% endif %}
        {% endfor %}
        <button type="submit" class="btn-glow">Update Password</button>
    </form>
</div>
