<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | Rincart</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
        }
        .otp-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            background: #ffffff;
        }
        .otp-input {
            width: 50px;
            height: 56px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            background-color: #f8f9fa;
            transition: all 0.2s ease-in-out;
        }
        .otp-input:focus {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
            outline: none;
        }
        /* Chrome, Safari, Edge, Opera ഉള്ളിലെ കൗണ്ടർ ആരോകൾ കളയാൻ */
        .otp-input::-webkit-outer-spin-button,
        .otp-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card otp-card p-4 text-center">
                
                <!-- Icon -->
                <div class="mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                        <i class="bi bi-shield-check fs-1"></i>
                    </div>
                </div>

                <h3 class="fw-bold mb-2 text-dark">Verification Code</h3>
                <p class="text-secondary small mb-4">We have sent a 4-digit verification code to your registered account.</p>

                <!-- Django Form -->
                <form method="POST" action="">
                    {% csrf_token %}
                    
                    <!-- OTP Inputs -->
                    <div class="d-flex justify-content-center gap-2 mb-4">
                        <input type="number" class="otp-input" name="otp_1" maxlength="1" required oninput="moveNext(this, 'otp_2')" id="otp_1">
                        <input type="number" class="otp-input" name="otp_2" maxlength="1" required oninput="moveNext(this, 'otp_3')" id="otp_2" onkeydown="moveBack(event, 'otp_1')">
                        <input type="number" class="otp-input" name="otp_3" maxlength="1" required oninput="moveNext(this, 'otp_4')" id="otp_3" onkeydown="moveBack(event, 'otp_2')">
                        <input type="number" class="otp-input" name="otp_4" maxlength="1" required id="otp_4" onkeydown="moveBack(event, 'otp_3')">
                    </div>

                    <!-- Hidden input to combine total OTP string if needed in backend -->
                    <input type="hidden" name="full_otp" id="full_otp">

                    <!-- Verify Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-3 fw-semibold mb-3">
                        Verify & Proceed
                    </button>
                </form>

                <!-- Resend Footer -->
                <div class="text-center">
                    <p class="text-secondary small mb-0">Didn't receive the code? 
                        <a href="#" class="text-primary fw-semibold text-decoration-none ms-1">Resend OTP</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Auto Focus JavaScript Logic -->
<script>
    // ആദ്യ ബോക്സിലേക്ക് പേജ് ലോഡ് ആകുമ്പോൾ ഓട്ടോ ഫോക്കസ് നൽകാൻ
    window.addEventListener('load', () => document.getElementById('otp_1').focus());

    function moveNext(current, nextId) {
        if (current.value.length >= 1) {
            document.getElementById(nextId).focus();
        }
    }

    function moveBack(event, prevId) {
        // Backspace അമർത്തുമ്പോൾ തൊട്ട് പിന്നിലെ ബോക്സിലേക്ക് പോകാൻ
        if (event.key === "Backspace" && event.target.value.length === 0) {
            document.getElementById(prevId).focus();
        }
    }

    // ഫോം സബ്മിറ്റ് ചെയ്യുമ്പോൾ എല്ലാ നമ്പറുകളും കൂട്ടി യോജിപ്പിക്കാൻ
    document.querySelector('form').addEventListener('submit', function() {
        const o1 = document.getElementById('otp_1').value;
        const o2 = document.getElementById('otp_2').value;
        const o3 = document.getElementById('otp_3').value;
        const o4 = document.getElementById('otp_4').value;
        document.getElementById('full_otp').value = o1 + o2 + o3 + o4;
    });
</script>

</body>
</html>
