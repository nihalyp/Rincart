<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Seller | RinCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg rounded-4 p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white d-inline-block p-3 rounded-circle mb-3">
                            <i class="bi bi-shop fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Start Selling on RinCart</h2>
                        <p class="text-muted">Grow your business online with millions of customers.</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Shop Name</label>
                            <input type="text" name="shop_name" class="form-control form-control-lg" placeholder="e.g., Rin Fashion Hub" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number</label>
                            <input type="tel" name="phone_number" class="form-control form-control-lg" placeholder="e.g., +91 9876543210" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">GST Number <span class="text-muted small">(Optional)</span></label>
                            <input type="text" name="gst_number" class="form-control form-control-lg" placeholder="15-digit GSTIN">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
