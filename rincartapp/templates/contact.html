<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - RinCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body >
        
    <div class="container py-5 my-5 rounded-4 shadow-sm p-4 p-md-5" style="max-width: 600px;">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none text-muted">Home</a></li>
                <li class="breadcrumb-item"><a href="{% url 'user_account' %}" class="text-decoration-none text-muted">Your Account</a></li>
                <li class="breadcrumb-item active fw-medium" aria-current="page" style="color: #764ba2;">Contact Us</li>
            </ol>
        </nav>
        <div class="text-center mb-4">
            <h1 class="fw-bold "><i class="bi bi-headset text-primary me-2"></i>Contact Us</h1>
            <p class="text-muted">We would love to hear from you. Drop us a message!</p>
        </div>

        <!-- 🔔 അലേർട്ട് മെസ്സേജ് കാണിക്കാൻ (ഫോമിന് തൊട്ടുമുകളിൽ ചേർക്കാം) -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show rounded-3 mb-3 small" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>{{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="dismiss" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- 📝 FORM START (method ഉം action ഉം ശ്രദ്ധിക്കുക) -->
        <form method="POST" action="">
            {% csrf_token %} <!-- Django സുരക്ഷാ ടോക്കൺ -->
            
            <div class="mb-3">
                <label class="form-label fw-medium small">Full Name</label>
                <!-- 💡 name="name" ചേർത്തു -->
                <input type="text" name="name" class="form-control rounded-3" placeholder="Enter your name" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-medium small">Email Address</label>
                <!-- 💡 name="email" ചേർത്തു -->
                <input type="email" name="email" class="form-control rounded-3" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-medium small">Message</label>
                <!-- 💡 name="message" ചേർത്തു -->
                <textarea name="message" class="form-control rounded-3" rows="4" placeholder="How can we help you?" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold rounded-3 shadow-sm" style="background: linear-gradient(135deg, #667eea, #764ba2); border: none;">Send Message</button>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="text-muted small mb-0"><i class="bi bi-envelope-at me-1"></i> support@rincart.com</p>
        </div>
    </div>
    <script>
            const toggleBtn = document.getElementById('darkModeToggle');
            const themeIcon = document.getElementById('darkModeIcon');
            const themeText = document.getElementById('darkModeText');
            const htmlElement = document.documentElement;

            // മുൻപ് സെറ്റ് ചെയ്ത തീം ഉണ്ടോ എന്ന് പരിശോധിക്കുന്നു (Local Storage)
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                htmlElement.setAttribute('data-bs-theme', savedTheme);
                updateButton(savedTheme);
            }

            toggleBtn.addEventListener('click', () => {
                // നിലവിലെ തീം ഏതാണെന്ന് നോക്കുന്നു
                const currentTheme = htmlElement.getAttribute('data-bs-theme');
                let newTheme = 'light';

                if (currentTheme === 'light' || !currentTheme) {
                    newTheme = 'dark';
                }

                // തീം മാറ്റുന്നു
                htmlElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme); // പേജ് റീഫ്രഷ് ചെയ്താലും മാറതിരിക്കാൻ
                updateButton(newTheme);
            });

            // തീം മാറുന്നതിനനുസരിച്ച് ബട്ടണിലെ ഐക്കണും ടെക്സ്റ്റും മാറ്റാൻ
            function updateButton(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill text-warning'; // സൂര്യന്റെ ഐക്കൺ
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill text-warning'; // ചന്ദ്രന്റെ ഐക്കൺ (Navbar എപ്പോഴും ഡാർക്ക് ആയതുകൊണ്ട് text-warning തന്നെയാണ് ഭംഗി)
            }
        }

    </script>
</body>
</html>
