<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .form-floating {
            position: relative;
        }

        /* Styling the dark mode floating inputs */
        .form-control-dark {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control-dark:focus {
            background-color: rgba(255, 255, 255, 0.08) !important;
            border-color: #a855f7;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }

        .form-floating > label {
            color: rgba(255, 255, 255, 0.5);
            padding-left: 1.25rem;
        }

        .form-floating > .form-control-dark:focus ~ label,
        .form-floating > .form-control-dark:not(:placeholder-shown) ~ label {
            color: #a855f7 !important;
            transform: scale(0.85) translateY(-0.75rem) translateX(0.15rem);
        }

        /* Premium glowing button */
        .btn-glow {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
        }

        .btn-glow:active {
            transform: translateY(0);
        }

        .accent-link {
            color: #a855f7;
            text-decoration: none;
            transition: color 0.2s;
        }

        .accent-link:hover {
            color: #c084fc;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="glass-card text-center">
                    <nav aria-label="breadcrumb" class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Home</a></li>
                            <li class="breadcrumb-item"><a href="{% url 'sign_in' %}" class="text-decoration-none">Sign In</a></li>
                            <li class="breadcrumb-item"><a href="{% url 'sign_up' %}" class="text-decoration-none">Sign Up</a></li>
                        </ol>
                        </ol>
                    </nav>
        <!-- Icon / Logo Area -->
        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill text-white fs-4"></i>
        </div>

        <!-- Headings -->
        <h3 class="text-white fw-bold mb-1">Create Account</h3>
        <p class="text-white-50 small mb-4">Join us to secure your custom dashboard.</p>

        <!-- Minimal Form -->
        <form method="POST" action="{% url 'sign_up' %}">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger p-2 small text-start" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="form-floating mb-3">
                <input type="email" class="form-control form-control-dark" id="floatingEmail" name="email" placeholder="name@example.com" required autocomplete="off">
                <label for="floatingEmail">Email address</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control form-control-dark" id="floatingPassword" name="password" placeholder="Password" required>
                <label for="floatingPassword">Password</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control form-control-dark" id="floatingConfirmPassword" name="retype_password" placeholder="Retype Password" required>
                <label for="floatingConfirmPassword">Retype Password</label>
            </div>

            <button class="btn btn-glow w-100 mb-4" type="submit">
                Sign Up <i class="bi bi-arrow-right ms-2"></i>
            </button>
        </form>

        <!-- Footer Links -->
        <div class="text-white-50 small">
            Already have an account? <a href="{% url 'sign_in' %}" class="accent-link fw-semibold">Log In</a>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
