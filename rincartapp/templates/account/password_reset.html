<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 3rem 2.5rem; max-width: 420px; width: 100%; color: white; }
        .form-control-dark { background-color: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff !important; border-radius: 12px; padding: 12px; width: 100%; margin-bottom: 20px; }
        .btn-glow { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); color: #ffffff; border: none; border-radius: 12px; padding: 0.8rem; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
<div class="glass-card text-center">
    <h3>Forgot Password?</h3>
    <p class="text-white-50 small mb-4">Enter your email to receive a secure reset link.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" class="form-control-dark" placeholder="Email Address" required>
        <button type="submit" class="btn-glow">Send Reset Link</button>
    </form>
</div>
</body>
</html>
