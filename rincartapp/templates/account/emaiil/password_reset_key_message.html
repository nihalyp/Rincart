<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 0; }
        .email-container { max-width: 550px; margin: 40px auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .email-header { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); padding: 30px; text-align: center; }
        .logo { max-height: 50px; width: auto; }
        .email-body { padding: 40px 30px; text-align: center; line-height: 1.6; }
        .btn-reset { display: inline-block; background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); color: #ffffff !important; text-decoration: none; padding: 14px 30px; font-weight: bold; border-radius: 12px; margin: 25px 0; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .email-footer { background: #f1f5f9; padding: 20px; text-align: center; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="email-container">
    <!-- Header with Logo -->
    <div class="email-header">
        <!-- ⚠️ നിങ്ങളുടെ ഒറിജിനൽ ലോഗോ ലിങ്ക് താഴെ നൽകുക -->
        <img src="https://i.postimg.cc/8kWK8sSW/Gemini-Generated-Image-wcltoiwcltoiwclt.png" alt="RinCart Logo" class="logo">
    </div>

    <!-- Body -->
    <div class="email-body">
        <h2 style="margin-top: 0; color: #1e293b;">Password Reset Request</h2>
        <p>Hi <strong>{{ user.get_username }}</strong>,</p>
        <p>We received a request to reset the password for your RinCart account. Click the button below to set up a new password:</p>
        
        <!-- Password Reset Button -->
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" class="btn-reset">
            Reset Password
        </a>

        <p style="font-size: 13px; color: #94a3b8; margin-top: 20px;">If you didn't request this, you can safely ignore this email.</p>
    </div>

    <!-- Footer -->
    <div class="email-footer">
        © 2026 RinCart. All rights reserved.
    </div>
</div>

</body>
</html>
