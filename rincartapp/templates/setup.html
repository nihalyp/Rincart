{% extends 'base.html' %}
{% block title %}
Name
{% endblock %}
{% block content %}
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 p-4 rounded-4">
                    <div class="card-body text-center">
                        <!-- Welcome Icon/Header -->
                        <div class="mb-4">
                            <span class="fs-1">🎉</span>
                            <h2 class="fw-bold mt-2 text-dark">Welcome to Rincart!</h2>
                            <p class="text-muted small">Let’s get your profile set up in seconds.</p>
                        </div>

                        <!-- Form -->
                        <form method="POST" class="text-start">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label for="first_name" class="form-label fw-semibold text-secondary">What is your great name?</label>
                                <input 
                                    type="text" 
                                    id="first_name" 
                                    name="first_name" 
                                    class="form-control form-control-lg border-2 rounded-3" 
                                    placeholder="Enter your name" 
                                    value="{{ user.first_name }}" 
                                    required
                                    autocomplete="off"
                                >
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 shadow-sm py-2">
                                Continue to Dashboard →
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
