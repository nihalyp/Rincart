<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Options - RinCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 900px;">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="{% url 'user_account' %}" class="text-decoration-none">Your Account</a></li>
                <li class="breadcrumb-item active">Payments</li>
            </ol>
        </nav>

        <h3 class="fw-bold mb-4">Payment Options</h3>

        <div class="card border-0 shadow-sm p-4 rounded-4">
            <h5 class="fw-bold mb-3"><i class="bi bi-credit-card-2-front me-2 text-primary"></i>Saved Cards & Wallets</h5>
            <p class="text-muted small">You have no saved cards. RinCart accepts all major credit/debit cards and UPI options.</p>
            <hr>
            <div class="d-flex gap-3 text-muted fs-3">
                <i class="bi bi-credit-card"></i>
                <i class="bi bi-wallet2"></i>
                <i class="bi bi-paypal"></i>
            </div>
        </div>
    </div>
        <script>
            const toggleBtn = document.getElementById('darkModeToggle');
            const themeIcon = document.getElementById('darkModeIcon');
            const themeText = document.getElementById('darkModeText');
            const htmlElement = document.documentElement;

            // മുൻപ് സെറ്റ് ചെയ്ത തീം ഉണ്ടോ എന്ന് പരിശോധിക്കുന്നു (Local Storage)
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                htmlElement.setAttribute('data-bs-theme', savedTheme);
                updateButton(savedTheme);
            }

            toggleBtn.addEventListener('click', () => {
                // നിലവിലെ തീം ഏതാണെന്ന് നോക്കുന്നു
                const currentTheme = htmlElement.getAttribute('data-bs-theme');
                let newTheme = 'light';

                if (currentTheme === 'light' || !currentTheme) {
                    newTheme = 'dark';
                }

                // തീം മാറ്റുന്നു
                htmlElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme); // പേജ് റീഫ്രഷ് ചെയ്താലും മാറതിരിക്കാൻ
                updateButton(newTheme);
            });

            // തീം മാറുന്നതിനനുസരിച്ച് ബട്ടണിലെ ഐക്കണും ടെക്സ്റ്റും മാറ്റാൻ
            function updateButton(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'bi bi-sun-fill text-warning'; // സൂര്യന്റെ ഐക്കൺ
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill text-warning'; // ചന്ദ്രന്റെ ഐക്കൺ (Navbar എപ്പോഴും ഡാർക്ക് ആയതുകൊണ്ട് text-warning തന്നെയാണ് ഭംഗി)
            }
        }

    </script>
</body>
</html>
